  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

%; display:block; -webkit-user-drag:none;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ dragging }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute; left:{{ ghostLeft }}; top:{{ ghostTop }}; transform:translate(-50%,-50%); pointer-events:none; z-index:30;\">\n            <div style=\"display:flex; align-items:center; gap:8px; padding:10px 16px; border-radius:100px; background:{{ ghostBg }}; box-shadow:0 8px 24px rgba(0,0,0,0.4); animation:pulse-ring 1.2s infinite;\">\n              <span style=\"font-size:13px; font-weight:700; color:#fff;\">{{ ghostLabel }}<\u002Fspan>\n              <svg width=\"12\" height=\"12\" viewBox=\"0 0 16 16\"><path d=\"M2 8h12M8 2l6 6-6 6\" stroke=\"#fff\" stroke-width=\"1.8\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ showShield }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute; inset:0; background:rgba(0,0,0,0.55); display:flex; align-items:flex-end; z-index:40;\">\n            <div style=\"width:100%; background:#F4F5F8; border-radius:24px 24px 0 0; padding:22px 20px 26px; box-sizing:border-box; display:flex; flex-direction:column; gap:16px; animation:sheet-up 0.22s ease-out; min-height:280px; box-shadow:0 -4px 24px rgba(0,0,0,0.12);\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n                <div>\n                  <div style=\"font-size:17px; font-weight:700; color:#16161B;\">{{ sheetTitle }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px; color:#77777F; margin-top:2px;\">{{ sheetSubtitle }}<\u002Fdiv>\n                <\u002Fdiv>\n                <sc-if value=\"{{ notProcessing }}\" hint-placeholder-val=\"{{ true }}\">\n                  <button onclick=\"{{ closeShield }}\" style=\"width:30px; height:30px; border-radius:50%; border:none; background:#E1E2E9; display:flex; align-items:center; justify-content:center; cursor:pointer;\">\n                    <svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\"><path d=\"M1 1l12 12M13 1L1 13\" stroke=\"#54545F\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ processing }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex; align-items:center; justify-content:center; padding:20px 0 8px;\">\n                  <div style=\"width:150px; height:150px; position:relative;\">\n                    <div style=\"position:absolute; inset:0; border-radius:50%; border:4px solid rgba(0,0,0,0.08); border-top-color:{{ transferAccent }}; animation:zk-spin 0.9s linear infinite;\"><\u002Fdiv>\n                    <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;\">\n                      <svg width=\"18\" height=\"22\" viewBox=\"0 0 16 20\" style=\"animation:zk-flip 1s ease-in-out infinite alternate;\">\n                        <rect x=\"1\" y=\"0.5\" width=\"14\" height=\"2\" rx=\"1\" fill=\"#16161B\"><\u002Frect>\n                        <rect x=\"1\" y=\"17.5\" width=\"14\" height=\"2\" rx=\"1\" fill=\"#16161B\"><\u002Frect>\n                        <path d=\"M2 2 H14 L8 10 L14 18 H2 L8 10 Z\" fill=\"#16161B\" opacity=\"0.85\"><\u002Fpath>\n                      <\u002Fsvg>\n                      <span style=\"font-size:12.5px; font-weight:700; color:#16161B; text-align:center; line-height:1.3; padding:0 20px;\">Generating<br>ZK Proof<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ notProcessing }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex; flex-direction:column; gap:16px;\">\n                  <div style=\"background:#E9EAEF; border:1px solid rgba(0,0,0,0.06); border-radius:16px; padding:16px; display:flex; align-items:center; gap:6px;\">\n                    <input type=\"number\" inputmode=\"decimal\" placeholder=\"0.00\" value=\"{{ amount }}\" onchange=\"{{ onAmountChange }}\" style=\"flex:1; background:transparent; border:none; outline:none; font-size:26px; font-weight:800; color:{{ amountColor }}; font-family:'Roboto',system-ui,sans-serif;\">\n                    <span style=\"font-size:15px; font-weight:800; color:{{ amountColor }};\">USDT<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size:12px; color:#77777F; margin-top:-10px;\">{{ sheetAvailableLabel }}<\u002Fdiv>\n\n                  <div style=\"display:flex; gap:10px;\">\n                    <button onclick=\"{{ setAmount20 }}\" style=\"flex:1; padding:11px; border-radius:12px; border:1px solid rgba(0,0,0,0.08); background:#E1E2E9; color:#16161B; font-size:13.5px; font-weight:600; cursor:pointer;\">20% · {{ pct20Label }}<\u002Fbutton>\n                    <button onclick=\"{{ setAmount50 }}\" style=\"flex:1; padding:11px; border-radius:12px; border:1px solid rgba(0,0,0,0.08); background:#E1E2E9; color:#16161B; font-size:13.5px; font-weight:600; cursor:pointer;\">50% · {{ pct50Label }}<\u002Fbutton>\n                  <\u002Fdiv>\n\n                  <button onclick=\"{{ onShield }}\" disabled=\"{{ shieldDisabled }}\" style=\"width:100%; padding:16px; border-radius:16px; border:none; background:{{ shieldButtonBg }}; color:#fff; font-size:16px; font-weight:800; cursor:{{ shieldButtonCursor }}; margin-top:4px;\">{{ sheetButtonLabel }}<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fx-import>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#FF3B5C&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#FF3B5C&quot;, &quot;#406AFF&quot;, &quot;#8B5CF6&quot;, &quot;#22C55E&quot;]}, &quot;defaultRevealed&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    publicBalance: 500,\n    privateBalance: 2250,\n    vaultBalance: 3500,\n    revealed: !!(this.props.defaultRevealed),\n    vaultRevealed: !!(this.props.defaultRevealed),\n    showShield: false,\n    processing: false,\n    transferFrom: 'public',\n    transferTo: 'private',\n    amount: '',\n    dragging: false,\n    dragSource: null,\n    dragOverTarget: null,\n    dragX: 0,\n    dragY: 0,\n  };\n\n  confirmTransfer() {\n    const { transferFrom, transferTo, amount } = this.state;\n    const amt = parseFloat(amount);\n    const sourceBalance = this.state[transferFrom + 'Balance'];\n    const validAmt = !isNaN(amt) && amt > 0 && amt <= sourceBalance;\n    if (!validAmt) return;\n    this.setState({ processing: true });\n    this._proofTimeout = setTimeout(() => {\n      this.setState(s => ({\n        [transferFrom + 'Balance']: Math.round((s[transferFrom + 'Balance'] - amt) * 100) / 100,\n        [transferTo + 'Balance']: Math.round((s[transferTo + 'Balance'] + amt) * 100) / 100,\n        showShield: false,\n        processing: false,\n        amount: '',\n      }));\n    }, 2000);\n  }\n\n  pointFromEvent(e) {\n    if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };\n    if (e.changedTouches && e.changedTouches[0]) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };\n    return { x: e.clientX, y: e.clientY };\n  }\n\n  startDrag(e, source) {\n    if (e.cancelable) e.preventDefault();\n    if (!this.containerEl || this.state.dragging) return;\n    if (e.pointerId != null && e.currentTarget && e.currentTarget.setPointerCapture) {\n      try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}\n    }\n    const { x, y } = this.pointFromEvent(e);\n    const rect = this.containerEl.getBoundingClientRect();\n    this.setState({ dragging: true, dragSource: source, dragX: x - rect.left, dragY: y - rect.top });\n  }\n\n  targetsFor(source) {\n    if (source === 'public') return ['private'];\n    if (source === 'private') return ['public', 'vault'];\n    if (source === 'vault') return ['private'];\n    return [];\n  }\n\n  cardEl(name) {\n    if (name === 'public') return this.publicCardEl;\n    if (name === 'private') return this.privateCardEl;\n    if (name === 'vault') return this.vaultCardEl;\n    return null;\n  }\n\n  componentDidMount() {\n    this._onMove = (e) => {\n      if (!this.state.dragging || !this.containerEl) return;\n      const pt = this.pointFromEvent(e);\n      const rect = this.containerEl.getBoundingClientRect();\n      const x = pt.x - rect.left;\n      const y = pt.y - rect.top;\n      const candidates = this.targetsFor(this.state.dragSource);\n      let overTarget = null;\n      for (const name of candidates) {\n        const el = this.cardEl(name);\n        if (!el) continue;\n        const pr = el.getBoundingClientRect();\n        if (pt.x >= pr.left && pt.x <= pr.right && pt.y >= pr.top && pt.y <= pr.bottom) {\n          overTarget = name;\n          break;\n        }\n      }\n      this.setState({ dragX: x, dragY: y, dragOverTarget: overTarget });\n    };\n    this._onUp = () => {\n      if (!this.state.dragging) return;\n      const target = this.state.dragOverTarget;\n      const source = this.state.dragSource;\n      this.setState({ dragging: false, dragOverTarget: null, dragSource: null });\n      if (target) {\n        this.setState({\n          showShield: true,\n          transferFrom: source,\n          transferTo: target,\n          amount: '',\n        });\n      }\n    };\n    window.addEventListener('pointermove', this._onMove);\n    window.addEventListener('pointerup', this._onUp);\n    // Fallback for browsers/inputs that don't deliver Pointer Events reliably.\n    window.addEventListener('mousemove', this._onMove);\n    window.addEventListener('mouseup', this._onUp);\n    window.addEventListener('touchmove', this._onMove, { passive: true });\n    window.addEventListener('touchend', this._onUp);\n    window.addEventListener('touchcancel', this._onUp);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('pointermove', this._onMove);\n    window.removeEventListener('pointerup', this._onUp);\n    window.removeEventListener('mousemove', this._onMove);\n    window.removeEventListener('mouseup', this._onUp);\n    window.removeEventListener('touchmove', this._onMove);\n    window.removeEventListener('touchend', this._onUp);\n    window.removeEventListener('touchcancel', this._onUp);\n    if (this._proofTimeout) clearTimeout(this._proofTimeout);\n  }\n\n  formatUSD(n) {\n    const v = Math.round(n * 100) / 100;\n    return v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' USDT';\n  }\n\n  renderVals() {\n    const accentColor = this.props.accentColor || '#FF3B5C';\n    const ligeroBlue = '#406AFF';\n    const vaultBlue = '#2F6FFF';\n    const {\n      publicBalance, privateBalance, vaultBalance,\n      revealed, vaultRevealed,\n      showShield, processing, transferFrom, transferTo, amount,\n      dragging, dragSource, dragOverTarget, dragX, dragY,\n    } = this.state;\n\n    const sourceBalance = this.state[transferFrom + 'Balance'];\n\n    const amt = parseFloat(amount);\n    const validAmt = !isNaN(amt) && amt > 0 && amt <= sourceBalance;\n\n    const transferAccent = (transferFrom === 'vault' || transferTo === 'vault')\n      ? vaultBlue\n      : (transferTo === 'private' ? accentColor : ligeroBlue);\n\n    const labelFor = (name) => ({ public: 'Checking (Public)', private: 'Savings (Private)', vault: 'Vault' }[name]);\n    const sheetVerbs = {\n      'public-private': 'Shield funds',\n      'private-public': 'Unshield funds',\n      'private-vault': 'Move to Vault',\n      'vault-private': 'Move from Vault',\n    };\n    const comboKey = transferFrom + '-' + transferTo;\n\n    const ghostBalance = this.state[(dragSource || 'public') + 'Balance'];\n    const ghostRevealed = dragSource === 'vault' ? vaultRevealed : (dragSource === 'private' ? revealed : true);\n    const ghostBgColor = dragSource === 'vault' ? vaultBlue : (dragSource === 'private' ? ligeroBlue : accentColor);\n\n    return {\n      accentColor,\n      ligeroBlue,\n      publicBalanceLabel: this.formatUSD(publicBalance),\n      privateBalanceLabel: revealed ? this.formatUSD(privateBalance) : '•••••• USDT',\n      vaultBalanceLabel: vaultRevealed ? this.formatUSD(vaultBalance) : '•••••• USDT',\n      revealed,\n      notRevealed: !revealed,\n      vaultRevealed,\n      vaultNotRevealed: !vaultRevealed,\n      toggleReveal: () => this.setState(s => ({ revealed: !s.revealed })),\n      toggleVaultReveal: () => this.setState(s => ({ vaultRevealed: !s.vaultRevealed })),\n\n      setContainerRef: (el) => { this.containerEl = el; },\n      setPrivateCardRef: (el) => { this.privateCardEl = el; },\n      setPublicCardRef: (el) => { this.publicCardEl = el; },\n      setVaultCardRef: (el) => { this.vaultCardEl = el; },\n      publicCardOpacity: dragging && dragSource === 'public' ? 0.5 : 1,\n      privateCardOpacity: dragging && dragSource === 'private' ? 0.5 : 1,\n      vaultCardOpacity: dragging && dragSource === 'vault' ? 0.5 : 1,\n\n      stopRevealPropagation: (e) => e.stopPropagation(),\n\n      onPublicPointerDown: (e) => {\n        this.startDrag(e, 'public');\n      },\n      onPrivatePointerDown: (e) => {\n        this.startDrag(e, 'private');\n      },\n      onVaultPointerDown: (e) => {\n        this.startDrag(e, 'vault');\n      },\n\n      dragging,\n      ghostLeft: dragX + 'px',\n      ghostTop: dragY + 'px',\n      ghostLabel: ghostRevealed ? this.formatUSD(ghostBalance) : '•••••• USDT',\n      ghostBg: ghostBgColor,\n\n      privateCardBg: (dragOverTarget === 'private') ? 'linear-gradient(135deg, rgba(255,59,92,0.92) 0%, rgba(255,59,92,0.78) 100%)' : 'linear-gradient(135deg, #3355F0 0%, #1F32A8 55%, #121F6E 100%)',\n      privateCardBorder: (dragOverTarget === 'private') ? accentColor : 'rgba(255,255,255,0.18)',\n      publicCardBg: (dragOverTarget === 'public') ? 'linear-gradient(135deg, rgba(64,106,255,0.9) 0%, rgba(64,106,255,0.75) 100%)' : 'linear-gradient(135deg, #14B87C 0%, #079452 60%, #05713F 100%)',\n      publicCardBorder: (dragOverTarget === 'public') ? ligeroBlue : 'rgba(255,255,255,0.18)',\n      vaultCardBg: (dragOverTarget === 'vault') ? 'linear-gradient(135deg, rgba(47,111,255,0.9) 0%, rgba(47,111,255,0.7) 100%)' : 'linear-gradient(135deg, #4C86FF 0%, #2F6FFF 55%, #1C4FD1 100%)',\n      vaultCardBorder: (dragOverTarget === 'vault') ? vaultBlue : 'rgba(255,255,255,0.14)',\n\n      showShield,\n      processing,\n      notProcessing: !processing,\n      transferAccent,\n      sheetTitle: sheetVerbs[comboKey] || 'Move funds',\n      sheetSubtitle: 'Move from ' + labelFor(transferFrom) + ' to ' + labelFor(transferTo),\n      sheetAvailableLabel: 'Available: ' + this.formatUSD(sourceBalance),\n      sheetButtonLabel: comboKey === 'public-private' ? 'Shield' : (comboKey === 'private-public' ? 'Unshield' : 'Move'),\n      amount,\n      onAmountChange: (e) => this.setState({ amount: e.target.value }),\n      closeShield: () => this.setState({ showShield: false, processing: false, amount: '' }),\n\n      pct20Label: this.formatUSD(sourceBalance * 0.2),\n      pct50Label: this.formatUSD(sourceBalance * 0.5),\n      setAmount20: () => this.setState({ amount: String(Math.round(sourceBalance * 0.2 * 100) / 100) }),\n      setAmount50: () => this.setState({ amount: String(Math.round(sourceBalance * 0.5 * 100) / 100) }),\n\n      amountColor: validAmt ? '#16161B' : '#9A9AA3',\n      shieldDisabled: !validAmt,\n      shieldButtonBg: validAmt ? transferAccent : '#2A2A32',\n      shieldButtonCursor: validAmt ? 'pointer' : 'not-allowed',\n\n      onShield: () => this.confirmTransfer(),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
